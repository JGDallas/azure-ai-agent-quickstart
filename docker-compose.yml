services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATA_DIR: /data
      SAMPLE_DOCS_DIR: /app/sample_docs
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
    restart: unless-stopped
